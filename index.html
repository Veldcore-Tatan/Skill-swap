<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вращающаяся Жаба</title>
    <style>
        body {
            background-color: #111111;
            color: #00ff00;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: monospace;
        }

        h1 {
            font-family: sans-serif;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        /* Контейнер для вращения */
        .frog-spinner {
            font-size: 20px;
            line-height: 1.1;
            white-space: pre;
            display: inline-block;
            /* Анимация вращения: название, время, линейно, бесконечно */
            animation: spin 2s linear infinite;
            transform-origin: center; /* Вращение вокруг центра */
        }

        /* Описание анимации вращения */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .platform {
            margin-top: 20px;
            color: #444;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <h1>Ква</h1>

    <div class="frog-spinner">
     _      _
    (o)____(o)
   /          \
  /   V    V   \
 |    ______    |
  \  \______/  /
   \__________/
     /      \
    /        \
    </div>

    <div class="platform">▲ ПОДОЖДИТЕ, ИДЕТ ЗАГРУЗКА КРУТОСТИ ▲</div>

    <script>
        // Добавим прикол: при клике жаба меняет направление
        const frog = document.querySelector('.frog-spinner');
        let clockwise = true;

        frog.onclick = () => {
            clockwise = !clockwise;
            frog.style.animationDirection = clockwise ? 'normal' : 'reverse';
        };
    </script>

</body>
</html>
