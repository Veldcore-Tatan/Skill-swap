<!DOCTYPE html>
<html lang="ru" "eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillFlow Ultra</title>
    <style>
        :root {
            --p-main: #8B5CF6; --p-soft: #DDD6FE; --p-dark: #2E1065;
            --bg: #F5F3FF; --panel: #FFFFFF; --text: #1E1B4B; --text-m: #6B7280;
            --glass: rgba(255, 255, 255, 0.7);
        }

        /* Пресеты палитр */
        [data-palette="emerald"] { --p-main: #10B981; --p-dark: #064E3B; --p-soft: #D1FAE5; }
        [data-palette="rose"] { --p-main: #F43F5E; --p-dark: #881337; --p-soft: #FFE4E6; }
        [data-palette="classic"] { --p-main: #6366F1; --p-dark: #1E1B4B; --p-soft: #E0E7FF; }

        [data-theme="dark"] {
            --bg: #0F172A; --panel: #1E293B; --text: #F1F5F9; --text-m: #94A3B8;
            --glass: rgba(30, 41, 59, 0.7); --p-soft: rgba(139, 92, 246, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg); color: var(--text); 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Живой фон */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; pointer-events: none; opacity: 0.6; }

        /* Стилизация с эффектом стекла */
        header, .nav-tabs, .view, .modal-content, .messenger-layout {
            backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1);
        }

        header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 2rem; background: var(--glass); z-index: 100; }
        .nav-tabs { display: flex; justify-content: center; gap: 2rem; background: var(--glass); border-bottom: 1px solid var(--p-soft); }
        .tab-btn { padding: 1rem; cursor: pointer; font-weight: 600; color: var(--text-m); border-bottom: 3px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--p-main); border-bottom-color: var(--p-main); }

        .app-main { flex: 1; overflow-y: auto; padding: 2rem; position: relative; }
        .view { display: none; max-width: 1100px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .view.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Профиль */
        .profile-card { background: var(--panel); border-radius: 24px; padding: 2rem; display: flex; gap: 2rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .avatar-huge { width: 120px; height: 120px; border-radius: 30px; background: var(--p-main); display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; box-shadow: 0 8px 16px var(--p-soft); cursor: pointer; }

        /* Мессенджер */
        .messenger-layout { display: flex; height: 75vh; background: var(--panel); border-radius: 24px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .sidebar { width: 300px; border-right: 1px solid var(--p-soft); display: flex; flex-direction: column; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(0,0,0,0.02); }
        .msg-container { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.8rem; }
        .msg { padding: 0.8rem 1.2rem; border-radius: 18px; max-width: 70%; position: relative; font-size: 0.95rem; }
        .msg.mine { align-self: flex-end; background: var(--p-main); color: white; border-bottom-right-radius: 4px; }
        .msg.other { align-self: flex-start; background: var(--bg); border: 1px solid var(--p-soft); border-bottom-left-radius: 4px; }

        /* Кнопки и формы */
        button { padding: 0.6rem 1.2rem; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; background: var(--p-main); color: white; transition: 0.2s; }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }
        input, select, textarea { padding: 0.8rem; border-radius: 12px; border: 1px solid var(--p-soft); background: var(--bg); color: var(--text); outline: none; }

        /* Палитра */
        .palette-dot { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        /* Инструкция */
        #guide { position: fixed; bottom: 20px; right: 20px; background: var(--p-dark); color: white; padding: 1rem; border-radius: 15px; display: none; z-index: 1000; max-width: 250px; }
    </style>
</head>
<body data-theme="dark" data-palette="default">

    <canvas id="bg-canvas"></canvas>

    <header>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <div class="logo" style="font-size: 1.8rem; font-weight: 900; color: var(--p-main);">SkillFlow</div>
            <div style="display: flex; gap: 5px;">
                <div class="palette-dot" style="background: #8B5CF6;" onclick="setPalette('default')"></div>
                <div class="palette-dot" style="background: #10B981;" onclick="setPalette('emerald')"></div>
                <div class="palette-dot" style="background: #F43F5E;" onclick="setPalette('rose')"></div>
                <div class="palette-dot" style="background: #6366F1;" onclick="setPalette('classic')"></div>
            </div>
        </div>
        <div style="display: flex; gap: 1rem;">
            <button onclick="toggleTheme()" style="background: var(--p-soft); color: var(--p-main);">🌓</button>
            <button onclick="openModal('edit-profile-modal')">⚙️ Профиль</button>
        </div>
    </header>

    <div class="nav-tabs">
        <div class="tab-btn active" onclick="switchTab(event, 'profile')">Профиль</div>
        <div class="tab-btn" onclick="switchTab(event, 'feed')">Стена</div>
        <div class="tab-btn" onclick="switchTab(event, 'chat')">Мессенджер</div>
    </div>

    <main class="app-main">
        <!-- ТУТ ПРОФИЛЬ -->
        <section id="view-profile" class="view active">
            <div class="profile-card">
                <div class="avatar-huge" id="prof-avatar">A</div>
                <div style="flex: 1;">
                    <h1 id="prof-name">Alex Skill</h1>
                    <p id="prof-bio" style="color: var(--text-m); margin: 0.5rem 0;">Senior JS Developer | Обучаю коду за еду</p>
                    <div style="display: flex; gap: 0.5rem; margin-top: 1rem;" id="prof-skills">
                        <span style="background: var(--p-soft); color: var(--p-main); padding: 0.3rem 0.8rem; border-radius: 8px;">JavaScript</span>
                        <span style="background: var(--p-soft); color: var(--p-main); padding: 0.3rem 0.8rem; border-radius: 8px;">UI Design</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- ТУТ СТЕНА -->
        <section id="view-feed" class="view">
            <div style="background: var(--panel); padding: 1.5rem; border-radius: 20px; margin-bottom: 2rem;">
                <textarea id="post-input" placeholder="Поделитесь навыком или мыслью..." style="width: 100%; height: 80px; margin-bottom: 1rem; border: none; background: transparent; font-size: 1.1rem;"></textarea>
                <button onclick="addPost()">Опубликовать</button>
            </div>
            <div id="feed-container"></div>
        </section>

        <!-- ТУТ ЧАТ -->
        <section id="view-chat" class="view">
            <div class="messenger-layout">
                <div class="sidebar">
                    <div style="padding: 1rem; border-bottom: 1px solid var(--p-soft);">
                        <button onclick="createGroup()" style="width: 100%;">+ Создать группу</button>
                    </div>
                    <div id="chat-list"></div>
                </div>
                <div class="chat-area">
                    <div id="chat-header" style="padding: 1rem; background: var(--panel); font-weight: bold; border-bottom: 1px solid var(--p-soft);">Выберите чат</div>
                    <div class="msg-container" id="msg-container"></div>
                    <div style="padding: 1rem; display: flex; gap: 1rem; background: var(--panel);">
                        <input type="text" id="chat-input" placeholder="Сообщение..." style="flex: 1; margin: 0;">
                        <button onclick="sendMsg()">➤</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- МОДАЛКА РЕДАКТИРОВАНИЯ -->
    <div id="edit-profile-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000;">
        <div class="modal-content" style="background: var(--panel); padding: 2rem; border-radius: 24px; width: 400px;">
            <h2>Настройки профиля</h2><br>
            <input type="text" id="edit-name" placeholder="Имя"><br>
            <input type="text" id="edit-bio" placeholder="О себе"><br>
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button style="background: gray;" onclick="closeModal()">Отмена</button>
                <button onclick="saveProfile()">Сохранить</button>
            </div>
        </div>
    </div>

    <div id="guide">
        <p>👋 Привет! Ты можешь менять цвета сайта в шапке. <br><br> Нажми на Профиль, чтобы настроить свою страницу.</p>
        <button onclick="this.parentElement.remove()" style="margin-top: 10px; width: 100%;">Понятно</button>
    </div>

    <script>
        // --- 1. ЖИВОЙ ФОН (PARTICLES) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
        }

        for(let i=0; i<50; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--p-main');
            particles.forEach(p => {
                p.update();
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- 2. СИСТЕМА ПАЛИТРЫ И ТЕМЫ ---
        function setPalette(p) { document.body.setAttribute('data-palette', p); }
        function toggleTheme() { document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark'; }

        // --- 3. ЛОГИКА ВКЛАДОК ---
        function switchTab(e, tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById('view-' + tab).classList.add('active');
        }

        // --- 4. РЕДАКТОР ПРОФИЛЯ ---
        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            document.getElementById('edit-name').value = document.getElementById('prof-name').innerText;
            document.getElementById('edit-bio').value = document.getElementById('prof-bio').innerText;
        }
        function closeModal() { document.querySelectorAll('[id$="-modal"]').forEach(m => m.style.display = 'none'); }
        function saveProfile() {
            document.getElementById('prof-name').innerText = document.getElementById('edit-name').value;
            document.getElementById('prof-bio').innerText = document.getElementById('edit-bio').value;
            document.getElementById('prof-avatar').innerText = document.getElementById('edit-name').value[0];
            closeModal();
        }

        // --- 5. СТЕНА (ПОСТЫ) ---
        function addPost() {
            const txt = document.getElementById('post-input').value;
            if(!txt) return;
            const card = document.createElement('div');
            card.className = 'profile-card animate-fade';
            card.style.marginBottom = '1rem';
            card.innerHTML = `<div><strong>${document.getElementById('prof-name').innerText}</strong><p>${txt}</p><br><small>❤️ 0 | 👁️ 1</small></div>`;
            document.getElementById('feed-container').prepend(card);
            document.getElementById('post-input').value = '';
        }

        // --- 6. ЧАТЫ ---
        let currentChat = null;
        const chats = [
            { id: 1, name: 'Мария (Английский)', msgs: ['Привет! Как успехи в JS?'] },
            { id: 2, name: 'Группа: Дизайнеры', msgs: ['Кто посмотрит мой макет?'] }
        ];

        function renderChats() {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';
            chats.forEach(c => {
                const item = document.createElement('div');
                item.style.padding = '1rem'; item.style.cursor = 'pointer'; item.style.borderBottom = '1px solid var(--p-soft)';
                item.innerText = c.name;
                item.onclick = () => selectChat(c);
                list.appendChild(item);
            });
        }

        function selectChat(chat) {
            currentChat = chat;
            document.getElementById('chat-header').innerText = chat.name;
            const container = document.getElementById('msg-container');
            container.innerHTML = '';
            chat.msgs.forEach(m => {
                const div = document.createElement('div');
                div.className = 'msg other'; div.innerText = m;
                container.appendChild(div);
            });
        }

        function sendMsg() {
            const input = document.getElementById('chat-input');
            if(!input.value || !currentChat) return;
            const div = document.createElement('div');
            div.className = 'msg mine'; div.innerText = input.value;
            document.getElementById('msg-container').appendChild(div);
            currentChat.msgs.push(input.value);
            input.value = '';
            document.getElementById('msg-container').scrollTop = 9999;
        }

        function createGroup() {
            const name = prompt("Введите название группы:");
            if(name) {
                chats.push({ id: chats.length+1, name: "👥 " + name, msgs: [] });
                renderChats();
            }
        }

        // Инициализация
        window.onload = () => {
            renderChats();
            setTimeout(() => document.getElementById('guide').style.display = 'block', 2000);
        }
    </script>
</body>
</html>
